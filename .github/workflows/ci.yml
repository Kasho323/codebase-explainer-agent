name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi httpx pytest ruff "tree-sitter>=0.23,<0.25" "tree-sitter-python>=0.23,<0.25" "anthropic>=0.50.0"
          pip install -e . --no-deps

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest -q
